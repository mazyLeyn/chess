<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Fusion | Fluid Motion</title>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #6366f1;
            --sq-l: #e2e8f0; 
            --sq-d: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            gap: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Tahta ve Taşların Konumlandırması */
        .board-container {
            position: relative;
            width: 560px;
            height: 560px;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            height: 100%;
        }

        .square {
            width: 100%;
            height: 100%;
            transition: background 0.3s;
        }

        .square.highlight { background: rgba(99, 102, 241, 0.4) !important; cursor: pointer; }

        /* Taş Animasyonu */
        .piece {
            position: absolute;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95); /* Yumuşak kayma */
            z-index: 10;
            user-select: none;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.4));
        }

        .piece:hover { transform: scale(1.1); }
        .piece.selected { filter: drop-shadow(0 0 15px var(--accent)); z-index: 20; }

        /* Yan Panel */
        .panel {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        button {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 800px) {
            .container { flex-direction: column; }
            .board-container { width: 90vw; height: 90vw; }
            .piece { width: 11.25vw; height: 11.25vw; font-size: 8vw; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="board-container" id="board-container">
            <div class="board-grid" id="grid"></div>
            </div>

        <div class="panel">
            <div class="card">
                <h3 id="turn-text">Sıra: Beyaz</h3>
            </div>
            <div class="card" style="flex-grow: 1; overflow-y: auto;" id="history">
                <small>Hamle Geçişleri:</small>
            </div>
            <button onclick="resetGame()">Yeni Oyun</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('board-container');
        const grid = document.getElementById('grid');
        const turnText = document.getElementById('turn-text');
        
        let turn = 'w';
        let selectedPiece = null;
        let piecesData = [];

        const icons = {
            w: { k: '♔', q: '♕', r: '♖', b: '♗', n: '♘', p: '♙' },
            b: { k: '♚', q: '♛', r: '♜', b: '♝', n: '♞', p: '♟' }
        };

        function createGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const sq = document.createElement('div');
                sq.className = 'square';
                const row = Math.floor(i / 8);
                const col = i % 8;
                sq.style.backgroundColor = (row + col) % 2 === 0 ? 'var(--sq-l)' : 'var(--sq-d)';
                sq.dataset.index = i;
                sq.onclick = () => handleSquareClick(i);
                grid.appendChild(sq);
            }
        }

        function spawnPieces() {
            const layout = ['r','n','b','q','k','b','n','r'];
            // Temizle
            document.querySelectorAll('.piece').forEach(p => p.remove());
            piecesData = [];

            // Siyah
            for(let i=0; i<8; i++) {
                addPiece(i, layout[i], 'b');
                addPiece(i+8, 'p', 'b');
            }
            // Beyaz
            for(let i=0; i<8; i++) {
                addPiece(48+i, 'p', 'w');
                addPiece(56+i, layout[i], 'w');
            }
        }

        function addPiece(index, type, color) {
            const el = document.createElement('div');
            el.className = 'piece';
            el.innerHTML = icons[color][type];
            el.style.color = color === 'w' ? '#fff' : '#000';
            
            const pieceObj = { el, index, type, color };
            updatePiecePosition(pieceObj);
            
            el.onclick = (e) => {
                e.stopPropagation();
                handlePieceClick(pieceObj);
            };

            container.appendChild(el);
            piecesData.push(pieceObj);
        }

        function updatePiecePosition(piece) {
            const row = Math.floor(piece.index / 8);
            const col = piece.index % 8;
            // 70px kare boyutu üzerinden hesapla (560/8)
            const size = container.offsetWidth / 8;
            piece.el.style.left = (col * size) + 'px';
            piece.el.style.top = (row * size) + 'px';
            piece.el.style.width = size + 'px';
            piece.el.style.height = size + 'px';
        }

        function handlePieceClick(piece) {
            if (piece.color !== turn) {
                if (selectedPiece) handleSquareClick(piece.index);
                return;
            }
            
            // Seçimi temizle
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
            
            selectedPiece = piece;
            piece.el.classList.add('selected');
        }

        function handleSquareClick(targetIndex) {
            if (!selectedPiece) return;

            // At yok olmasın diye: Hedefte taş varsa onu ye (sil)
            const victimIndex = piecesData.findIndex(p => p.index === targetIndex);
            if (victimIndex !== -1) {
                const victim = piecesData[victimIndex];
                if (victim.color === selectedPiece.color) {
                    // Aynı renkse sadece seçimi değiştir
                    handlePieceClick(victim);
                    return;
                } else {
                    // Farklı renkse taşı ye
                    victim.el.style.opacity = '0';
                    victim.el.style.transform = 'scale(0)';
                    setTimeout(() => victim.el.remove(), 400);
                    piecesData.splice(victimIndex, 1);
                }
            }

            // Hareketi Yap
            selectedPiece.index = targetIndex;
            updatePiecePosition(selectedPiece);
            
            // Sırayı Değiştir
            turn = turn === 'w' ? 'b' : 'w';
            turnText.innerText = `Sıra: ${turn === 'w' ? 'Beyaz' : 'Siyah'}`;
            
            // Seçimi kaldır
            selectedPiece.el.classList.remove('selected');
            selectedPiece = null;
        }

        function resetGame() {
            turn = 'w';
            turnText.innerText = "Sıra: Beyaz";
            selectedPiece = null;
            createGrid();
            spawnPieces();
        }

        // İlk başlatma
        window.onload = () => {
            createGrid();
            spawnPieces();
        };

        // Pencere boyutu değişirse taşları yeniden hizala
        window.onresize = () => {
            piecesData.forEach(p => updatePiecePosition(p));
        };
    </script>
</body>
</html>
