<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Fusion Pro | Fluid & Modern</title>
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --text: #f8fafc;
            /* Tahta Renkleri - Modern Pastel */
            --sq-l: #e2e8f0; 
            --sq-d: #94a3b8;
        }

        body.theme-midnight {
            --bg: #020617;
            --accent: #0ea5e9;
            --sq-l: #1e293b;
            --sq-d: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* Arka plan akışkanlığı */
        .bg-glow {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1) translate(-10%, -10%); }
            to { transform: scale(1.2) translate(10%, 10%); }
        }

        .container {
            display: flex;
            width: 95vw;
            max-width: 1200px;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            gap: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* Tahta Alanı - Çökme Sorunu Çözüldü */
        .board-wrapper {
            flex: 1.5;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 10px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 12.5%);
            grid-template-rows: repeat(8, 12.5%);
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1; /* Kare formunu zorunlu kılar */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
            border: 4px solid rgba(255,255,255,0.05);
        }

        .square {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: background 0.2s ease;
        }

        /* Taşların Görünümü */
        .piece {
            font-size: clamp(1.5rem, 4vw, 3rem);
            z-index: 2;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }

        .square:hover .piece { transform: scale(1.15); }

        /* Durum Efektleri */
        .square.selected { background: var(--accent) !important; opacity: 0.8; }
        .square.valid-move::after {
            content: '';
            width: 15px; height: 15px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }

        /* Yan Panel */
        .ui-panel {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; background: #fff; }
        .dot.black { background: #000; border: 1px solid #fff; }

        select, button {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }

        button:hover { background: var(--accent); }

        .history {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.85rem;
            opacity: 0.7;
            max-height: 200px;
        }

        @media (max-width: 850px) {
            .container { flex-direction: column; height: 95vh; padding: 12px; }
            .ui-panel { flex: 1; }
        }
    </style>
</head>
<body class="theme-dark">

    <div class="bg-glow"></div>

    <main class="container">
        <section class="board-wrapper">
            <div id="board"></div>
        </section>

        <aside class="ui-panel">
            <div class="card">
                <div class="turn-indicator">
                    <div id="turn-dot" class="dot"></div>
                    <span id="turn-text">Beyazın Sırası</span>
                </div>
            </div>

            <div class="card">
                <h3>Özelleştir</h3>
                <label>Görünüm
                    <select onchange="document.body.className = this.value">
                        <option value="theme-dark">Dark Minimal</option>
                        <option value="theme-midnight">Midnight Blue</option>
                    </select>
                </label>
                <button onclick="resetGame()" style="margin-top: 15px;">Yeni Oyun</button>
            </div>

            <div class="card history" id="move-history">
                <div>Hamleler bekleniyor...</div>
            </div>
            
            <div style="font-size: 0.7rem; opacity: 0.4; text-align: center;">
                Onur Karataş Projesi v2.0
            </div>
        </aside>
    </main>

    <script>
        const boardEl = document.getElementById('board');
        const turnText = document.getElementById('turn-text');
        const turnDot = document.getElementById('turn-dot');
        const historyEl = document.getElementById('move-history');

        let board = Array(64).fill(null);
        let selectedIdx = null;
        let turn = 'w';

        const pieceIcons = {
            'w': { k: '♔', q: '♕', r: '♖', b: '♗', n: '♘', p: '♙' },
            'b': { k: '♚', q: '♛', r: '♜', b: '♝', n: '♞', p: '♟' }
        };

        function setup() {
            board = Array(64).fill(null);
            const layout = ['r','n','b','q','k','b','n','r'];
            
            for(let i=0; i<8; i++) {
                board[i] = { type: layout[i], color: 'b' };
                board[i+8] = { type: 'p', color: 'b' };
                board[48+i] = { type: 'p', color: 'w' };
                board[56+i] = { type: layout[i], color: 'w' };
            }
            render();
        }

        function render() {
            boardEl.innerHTML = '';
            for(let i=0; i<64; i++) {
                const square = document.createElement('div');
                square.className = 'square';
                
                // Kare Rengi
                const row = Math.floor(i / 8);
                const col = i % 8;
                square.style.backgroundColor = (row + col) % 2 === 0 ? 'var(--sq-l)' : 'var(--sq-d)';

                if(board[i]) {
                    const p = document.createElement('div');
                    p.className = 'piece';
                    p.textContent = pieceIcons[board[i].color][board[i].type];
                    p.style.color = board[i].color === 'w' ? '#fff' : '#000';
                    square.appendChild(p);
                }

                if(selectedIdx === i) square.classList.add('selected');

                square.onclick = () => handleClick(i);
                boardEl.appendChild(square);
            }
        }

        function handleClick(i) {
            const piece = board[i];

            if(selectedIdx === null) {
                if(piece && piece.color === turn) {
                    selectedIdx = i;
                }
            } else {
                if(i !== selectedIdx) {
                    executeMove(selectedIdx, i);
                }
                selectedIdx = null;
            }
            render();
        }

        function executeMove(from, to) {
            // Basit hareket mantığı (Kural kontrolü buraya eklenebilir)
            const movingPiece = board[from];
            board[to] = movingPiece;
            board[from] = null;

            // Sıra değişimi
            turn = turn === 'w' ? 'b' : 'w';
            updateUI();
            
            // Ses efekti simülasyonu veya titreşim
            if(window.navigator.vibrate) window.navigator.vibrate(10);
            
            logMove(from, to, movingPiece);
        }

        function updateUI() {
            turnText.textContent = turn === 'w' ? 'Beyazın Sırası' : 'Siyahın Sırası';
            turnDot.className = turn === 'w' ? 'dot' : 'dot black';
        }

        function logMove(f, t, p) {
            const div = document.createElement('div');
            const coords = (idx) => String.fromCharCode(97 + (idx % 8)) + (8 - Math.floor(idx / 8));
            div.textContent = `${p.type.toUpperCase()}: ${coords(f)} → ${coords(t)}`;
            historyEl.prepend(div);
        }

        function resetGame() {
            turn = 'w';
            selectedIdx = null;
            historyEl.innerHTML = '';
            updateUI();
            setup();
        }

        setup();
    </script>
</body>
</html>
